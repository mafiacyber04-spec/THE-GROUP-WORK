<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#1e3c72,#2a5298,#00c6ff,#0072ff);
    background-size:400% 400%;
    animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.register-card{
    width:400px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    color:white;
    animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.register-card h2{
    text-align:center;
    margin-bottom:30px;
}

.input-box{
    position:relative;
    margin-bottom:25px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    border-bottom:2px solid #fff;
    background:transparent;
    outline:none;
    color:white;
}

.input-box label{
    position:absolute;
    top:12px;
    left:0;
    transition:0.3s;
    color:#ddd;
}

.input-box input:focus + label,
.input-box input:valid + label{
    top:-10px;
    font-size:12px;
    color:#00c6ff;
}

.show-pass{
    position:absolute;
    right:0;
    top:12px;
    cursor:pointer;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:linear-gradient(to right,#00c6ff,#0072ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.footer a{
    color:#fff;
    text-decoration:underline;
}

.error{
    font-size:13px;
    color:#ff6b6b;
    margin-top:-15px;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="register-card">
  <h1>🛒SIMS|| <span style="font-size: small;color: rgb(10, 10, 10);">stock invetory management system</span></h1>

    <div class="input-box">
        <input type="text" id="username" required>
        <label>✉️User Name</label>
    </div>

    <div class="input-box">
        <input type="email" id="email" required>
        <label>✉️Email Address</label>
    </div>

    <div class="input-box">
        <input type="password" id="password" required>
        <label>🔐 Password</label>
        <span class="show-pass" onclick="togglePassword('password')">Show</span>
    </div>

    <div class="input-box">
        <input type="password" id="confirmPassword" required>
        <label>🔐 Confirm Password</label>
        <span class="show-pass" onclick="togglePassword('confirmPassword')">Show</span>
    </div>

    <div id="errorMsg" class="error"></div>

    <button onclick="register()">Register</button>

    <div class="footer">
        Already have account? <a href="login.html">Login</a>
    </div>
</div>

<script>
function togglePassword(id){
    let field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

function register(){
    let username = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let errorMsg = document.getElementById("errorMsg");

    if(username === "" || email === "" || password === "" || confirmPassword === ""){
        errorMsg.innerText = "Please fill all fields";
        return;
    }

    if(password !== confirmPassword){
        errorMsg.innerText = "Passwords do not match";
        return;
    }

    errorMsg.innerText = "";
    
    let user = {
        username: username,
        email: email,
        password: password
    };

    localStorage.setItem("user", JSON.stringify(user));

    alert("Registration Successful!");
    window.location.href="login.html";
}
</script>

</body>
</html>
